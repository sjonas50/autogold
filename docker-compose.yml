services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: gold_timescaledb
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: gold
      POSTGRES_PASSWORD: gold
      POSTGRES_DB: gold_trading
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gold -d gold_trading"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  timescaledb_data:
